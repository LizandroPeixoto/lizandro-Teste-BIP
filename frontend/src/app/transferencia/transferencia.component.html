<div class="container-fluid py-4" style="background: #f4f6f9; min-height: 100vh;">
  <div class="container">

    <!-- Cabeçalho -->
    <div class="card shadow-sm mb-4">
      <div class="card-body d-flex align-items-center py-3 gap-3">
        <a routerLink="/beneficios" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
        <div>
          <h4 class="mb-0 fw-bold">
            <i class="bi bi-arrow-left-right text-primary me-2"></i>Transferência entre Beneficiários
          </h4>
          <small class="text-muted">Transfira valor de um beneficiário para outro</small>
        </div>
      </div>
    </div>

    <!-- Alertas -->
    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible d-flex align-items-center" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span>{{ errorMessage }}</span>
      <button type="button" class="btn-close ms-auto" (click)="errorMessage=''"></button>
    </div>
    <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i>
      <span>{{ successMessage }}</span>
    </div>

    <!-- Formulário -->
    <div class="card shadow-sm" style="max-width: 520px;">
      <div class="card-header bg-white py-3">
        <span class="fw-semibold text-secondary">
          <i class="bi bi-cash-stack me-1"></i>Dados da Transferência
        </span>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">ID de Origem <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input [(ngModel)]="fromId" type="number" min="1" class="form-control"
                   placeholder="ID do beneficiário de origem" />
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">ID de Destino <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill-add"></i></span>
            <input [(ngModel)]="toId" type="number" min="1" class="form-control"
                   placeholder="ID do beneficiário de destino" />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Valor <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text">R$</span>
            <input [(ngModel)]="amount" type="number" step="0.01" min="0.01" class="form-control"
                   placeholder="0,00" />
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" (click)="transferir()" [disabled]="loading">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
            <i *ngIf="!loading" class="bi bi-check-circle me-1"></i>
            Confirmar Transferência
          </button>
          <a routerLink="/beneficios" class="btn btn-outline-secondary">
            <i class="bi bi-x-circle me-1"></i>Cancelar
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
